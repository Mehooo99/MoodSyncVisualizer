name: Deploy Jewelry App

on:
  push:
    branches: [ main ] # Change this to your branch name if it's not main

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: 'ClientApp/package.json'

      - name: Install and Build
        run: |
          cd ClientApp
          npm install
          npm run build
        env:
          # This ensures the build knows it's being hosted in a subfolder
          BASE_URL: /${{ github.event.repository.name }}/

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # IMPORTANT: This must match your Vite build output (usually 'dist')
          path: './ClientApp/dist'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
